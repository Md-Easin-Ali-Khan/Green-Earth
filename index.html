<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <link rel="shortcut icon" href="assets/hero-leaf1.png" type="image/x-icon">

    <!-- daisy + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <!-- navigation bar -->
    <header class="flex justify-around py-9 bg-green-700 items-center">
        <div class="logo">
            <h2 class="text-4xl text-white font-semibold">Green Earth</h2>
        </div>

        <!-- nav menu -->
        <ul class="flex gap-6 text-white font-semibold">
            <li>About</li>
            <li>Gallery</li>
            <li>Plant a Tree</li>
        </ul>

        <!-- nav button -->
        <div>
            <button class="btn btn-warning rounded-[999px] text-lg text-green-900 font-semibold py-3 px-5">Plant a
                Tree</button>
        </div>
    </header>

    <!-- hero section -->
    <section class="flex justify-between items-center bg-sky-100">
        <div>
            <img src="assets/hero-leaf1.png" alt="">
        </div>
        <!-- hero content -->
        <div class="space-y-6 text-center">
            <h1 class="text-5xl text-gray-700 font-bold">Plant a Tree, Grow a Future</h1>
            <p class="text-lg">Join our mission to plant 1 million trees and make the Earth greener for future
                generations.</p>
            <button class="btn btn-warning rounded-[999px] text-lg text-green-900 font-semibold py-3 px-5">Get
                Involved</button>
        </div>
        <div>
            <img src="assets/hero-leaf2.png" alt="">
        </div>
    </section>

    <!-- main section -->
    <main class="my-24 w-10/12 mx-auto">
        <h2 class="text-3xl text-center mb-10">Choose Your Trees</h2>
        <div class="grid grid-cols-12 gap-7">

            <!-- category area -->
            <div class="bg-white card col-span-3 card card-body shadow-2xl rounded-md">
                <h3 class="text-xl font-semibold mb-4">Categories</h3>

                <div class="space-y-3">
                    <button class="btn w-full justify-start text-lg text-white  font-bold bg-green-800 py-2 outline">All
                        Trees</button>

                    <div id="category-container" class="space-y-3">

                    </div>
                </div>
            </div>

            <!-- trees area -->
            <div class="bg-red-700 col-span-6">somthing 2</div>

            <!-- cart area -->
            <div class="bg-sky-700 col-span-3">
                <h3 class="text-xl font-semibold mb-4 text-black">Your Cart</h3>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
