<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>
    <link rel="shortcut icon" href="assets/hero-leaf1.png" type="image/x-icon">

    <!-- daisy + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <!-- navigation bar -->
    <header class="flex justify-around py-9 bg-green-700 items-center">
        <div class="logo">
            <h2 class="text-4xl text-white font-semibold">Green Earth</h2>
        </div>

        <!-- nav menu -->
        <ul class="flex gap-6 text-white font-semibold">
            <li>About</li>
            <li>Gallery</li>
            <li>Plant a Tree</li>
        </ul>

        <!-- nav button -->
        <div>
            <button class="btn btn-warning rounded-[999px] text-lg text-green-900 font-semibold py-3 px-5">Plant a
                Tree</button>
        </div>
    </header>

    <!-- hero section -->
    <section class="flex justify-between items-center bg-sky-100">
        <div>
            <img src="assets/hero-leaf1.png" alt="">
        </div>
        <!-- hero content -->
        <div class="space-y-6 text-center">
            <h1 class="text-5xl text-gray-700 font-bold">Plant a Tree, Grow a Future</h1>
            <p class="text-lg">Join our mission to plant 1 million trees and make the Earth greener for future
                generations.</p>
            <button class="btn btn-warning rounded-[999px] text-lg text-green-900 font-semibold py-3 px-5">Get
                Involved</button>
        </div>
        <div>
            <img src="assets/hero-leaf2.png" alt="">
        </div>
    </section>

    <!-- main section -->
    <main class="my-24 w-[95%] mx-auto">
        <h2 class="text-3xl text-center mb-10">Choose Your Trees</h2>
        <div class="grid grid-cols-12 gap-5">

            <!-- category area -->
            <div class="bg-white card col-span-3 card card-body shadow-2xl rounded-md">
                <h3 class="text-xl font-semibold mb-4">Categories</h3>
                <!-- category button -->
                <div class="space-y-3 sticky top-3">
                    <button id="allTreesBtn"
                        class="btn w-full justify-start text-lg text-white  font-bold bg-green-800 py-2 outline">All
                        Trees</button>

                    <div id="category-container" class="space-y-3">

                    </div>
                </div>
            </div>

            <!-- trees area -->
            <div class="col-span-6">
                <div id="trees-container" class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                </div>

                <!-- loading-spinner -->
                <div id="loading-spinner" class="h-[60vh] flex hidden justify-center items-center">
                    <span class="loading loading-bars loading-xl"></span>
                </div>
            </div>

            <!-- cart area -->
            <div class="bg-sky-700 col-span-3">
                <h3 class="text-xl font-semibold mb-4 text-black">Your Cart</h3>
            </div>
        </div>
        <!-- Product details modal -->
        <dialog id="tree-details-modal" class="modal">
            <div class="modal-box">

                <!-- Modal Header with Close Button -->
                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-2xl text-green-700" id="modalTitle">Tree Details</h3>
                    <button class="btn btn-sm btn-circle btn-ghost"
                        onclick="document.getElementById('tree-details-modal').close()">✕</button>
                </div>

                <!-- Modal Content -->
                <div class=" gap-6">
                    <!-- Plant Image -->
                    <img id="modalImage" src="" alt="plant" class="w-full !h-[250px] object-cover rounded-lg mb-12">

                    <!-- Plant Details -->
                    <div class="">
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category:</span>
                            <span id="modalCategory" class="badge badge-primary"></span>
                        </p>
                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modalDescription"></span>
                        </p>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold text-green-600">$<span id="modalPrice">0</span></span>
                        </div>
                    </div>
                </div>


                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>

    <script src="script.js"></script>
</body>

</html>
